<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interaktiivinen Kello - Opi kellonajat</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            touch-action:none;
            font-family:'Plus Jakarta Sans','Noto Sans Arabic',sans-serif;
            height:100vh;
            display:flex; align-items:center; justify-content:center;
        }
        .main-container {
            height:100vh; width:100%; max-width:600px;
            display:flex; flex-direction:column;
            background:white;
        }
        #clockCanvas { cursor:grab; touch-action:none; }
    </style>
</head>
<body>

<div class="main-container">

<div style="text-align:center; padding:10px;">
    <canvas id="clockCanvas" width="500" height="500"></canvas>

    <div style="margin-top:10px;">
        <span id="digitalClock" style="font-size:24px; font-weight:bold;">12:00</span>
        <input id="timeInput" type="time" step="60" style="margin-left:10px;">
    </div>
</div>

</div>

<script>
const canvas = document.getElementById('clockCanvas');
const ctx = canvas.getContext('2d');

let currentMinutes = 0;
let dragTarget = null;

const centerX = 250, centerY = 250, clockRadius = 155;

// ---------- DRAW ----------
function drawClock() {
    ctx.clearRect(0,0,500,500);

    ctx.beginPath();
    ctx.arc(centerX, centerY, clockRadius, 0, 2*Math.PI);
    ctx.fillStyle='white';
    ctx.fill();
    ctx.stroke();

    for(let i=1;i<=12;i++){
        const a = (i*30-90)*Math.PI/180;
        ctx.fillText(i, centerX+(clockRadius-30)*Math.cos(a), centerY+(clockRadius-30)*Math.sin(a));
    }

    const m = currentMinutes % 60;
    const h = Math.floor(currentMinutes/60)%12;

    drawHand((h + m/60)*30, clockRadius*0.6, 8, '#000');
    drawHand(m*6, clockRadius*0.9, 4, 'blue');
}

function drawHand(angle, length, width, color){
    const a = (angle-90)*Math.PI/180;
    ctx.beginPath();
    ctx.lineWidth=width;
    ctx.strokeStyle=color;
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(centerX+length*Math.cos(a), centerY+length*Math.sin(a));
    ctx.stroke();
}

// ---------- UPDATE ----------
function updateDisplay(){
    const h = Math.floor(currentMinutes/60)%12;
    const m = currentMinutes%60;

    const txt = `${(h||12).toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
    document.getElementById('digitalClock').innerText = txt;

    document.getElementById('timeInput').value = txt;

    drawClock();
}

// ---------- FIXED DRAG ----------
function startDragging(e){
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX || e.touches[0].clientX) - rect.left;
    const y = (e.clientY || e.touches[0].clientY) - rect.top;

    const dx = x - centerX;
    const dy = y - centerY;

    const dist = Math.sqrt(dx*dx + dy*dy);

    let angle = Math.atan2(dy, dx)*180/Math.PI + 90;
    if(angle<0) angle+=360;

    const m = currentMinutes%60;
    const h = Math.floor(currentMinutes/60)%12;

    const mAngle = m*6;
    const hAngle = h*30 + m*0.5;

    const diffM = Math.min(Math.abs(angle-mAngle), 360-Math.abs(angle-mAngle));
    const diffH = Math.min(Math.abs(angle-hAngle), 360-Math.abs(angle-hAngle));

    if(dist > 120){
        dragTarget = diffM < 30 ? 'minute' : null;
    } else {
        dragTarget = diffH < 30 ? 'hour' : null;
    }

    if(!dragTarget){
        dragTarget = diffM < diffH ? 'minute' : 'hour';
    }
}

function handleInteraction(e){
    if(!dragTarget) return;

    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX || e.touches[0].clientX) - rect.left;
    const y = (e.clientY || e.touches[0].clientY) - rect.top;

    const dx = x - centerX;
    const dy = y - centerY;

    let angle = Math.atan2(dy, dx)*180/Math.PI + 90;
    if(angle<0) angle+=360;

    let h = Math.floor(currentMinutes/60);
    let m = currentMinutes%60;

    if(dragTarget === 'minute'){
        m = Math.round(angle/6)%60;
    } else {
        const newHour = angle / 30;
        h = Math.floor(newHour)%12;
    }

    currentMinutes = h*60 + m;
    updateDisplay();
}

function stopDragging(){ dragTarget = null; }

// ---------- INPUT ----------
document.getElementById('timeInput').addEventListener('input', e=>{
    const val = e.target.value;
    if(!val) return;

    const [h,m] = val.split(':').map(Number);
    currentMinutes = (h%12)*60 + m;
    updateDisplay();
});

// ---------- EVENTS ----------
canvas.addEventListener('mousedown', startDragging);
window.addEventListener('mousemove', handleInteraction);
window.addEventListener('mouseup', stopDragging);

canvas.addEventListener('touchstart', startDragging);
canvas.addEventListener('touchmove', handleInteraction);
canvas.addEventListener('touchend', stopDragging);

// ---------- INIT ----------
updateDisplay();
</script>

</body>
</html>
