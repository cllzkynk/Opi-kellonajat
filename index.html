<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interaktiivinen Kello - Opi kellonajat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            touch-action: none; 
            font-family: 'Plus Jakarta Sans', 'Noto Sans Arabic', sans-serif;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container {
            height: 100vh;
            height: 100dvh;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            background: white;
            position: relative;
        }

        .header-section {
            flex-shrink: 0;
            padding: 0.75rem 1rem 0.5rem;
            background: linear-gradient(to bottom, #f8fafc, white);
            border-bottom: 1px solid #e2e8f0;
        }

        .clock-display-area {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: 0.5rem 1rem;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .clock-canvas-wrapper {
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            width: 100%;
            max-height: 50vh;
        }

        #clockCanvas {
            max-width: min(90vw, 450px);
            max-height: min(50vh, 450px);
            width: auto;
            height: auto;
            cursor: grab;
            touch-action: none;
        }

        #clockCanvas:active {
            cursor: grabbing;
        }

        .readings-panel {
            flex-shrink: 0;
            margin-top: 0.75rem;
            background: #f8fafc;
            border-radius: 1.25rem;
            padding: 1rem;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.06);
        }

        .alt-reading-block {
            min-height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .footer-section {
            flex-shrink: 0;
            padding: 0.75rem 1rem;
            background: linear-gradient(to top, #f8fafc, white);
            border-top: 1px solid #e2e8f0;
        }

        .arabic {
            direction: rtl;
            font-family: 'Noto Sans Arabic', sans-serif;
        }

        .btn-lang {
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-lang:active {
            transform: scale(0.95);
        }

        /* Küçük ekranlar için */
        @media (max-height: 700px) {
            .header-section {
                padding: 0.5rem 1rem 0.35rem;
            }
            .clock-canvas-wrapper {
                max-height: 42vh;
            }
            #clockCanvas {
                max-height: min(42vh, 380px);
            }
            .readings-panel {
                padding: 0.75rem;
                margin-top: 0.5rem;
            }
            .alt-reading-block {
                min-height: 60px;
            }
            .footer-section {
                padding: 0.5rem 1rem;
            }
        }

        /* Çok küçük ekranlar için */
        @media (max-height: 600px) {
            .header-section {
                padding: 0.4rem 0.75rem 0.25rem;
            }
            .clock-canvas-wrapper {
                max-height: 38vh;
            }
            #clockCanvas {
                max-height: min(38vh, 320px);
            }
            .readings-panel {
                padding: 0.6rem;
                margin-top: 0.4rem;
            }
            .alt-reading-block {
                min-height: 50px;
            }
            .footer-section {
                padding: 0.4rem 0.75rem;
            }
        }

        /* Tablet ve üzeri için */
        @media (min-width: 640px) {
            .main-container {
                border-radius: 2rem;
                box-shadow: 0 20px 60px -10px rgba(0, 0, 0, 0.3);
                margin: 1rem;
                height: calc(100vh - 2rem);
                height: calc(100dvh - 2rem);
            }
        }

        /* Landscape mode için özel düzenleme */
        @media (orientation: landscape) and (max-height: 500px) {
            .clock-canvas-wrapper {
                max-height: 55vh;
            }
            #clockCanvas {
                max-height: min(55vh, 300px);
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <!-- Başlık Bölümü -->
        <div class="header-section">
            <h1 class="text-sm md:text-base font-bold text-slate-800 text-center leading-tight">
                Opi kellonajat <span class="text-indigo-600 font-normal arabic ml-1">(تعلم الأوقات)</span>
            </h1>
            <div class="bg-indigo-50 border border-indigo-200 text-indigo-700 py-1 px-2 mt-1 rounded-lg inline-block mx-auto block w-fit">
                <p class="text-[9px] md:text-[10px] font-bold">🕒 1 tunti = 60 minuuttia <span class="arabic font-normal ml-1">(ساعة = 60 دقيقة)</span></p>
            </div>
        </div>

        <!-- Ana Görüntüleme Alanı (Saat + Okunuşlar) -->
        <div class="clock-display-area">
            
            <!-- Saat Kadranı -->
            <div class="clock-canvas-wrapper">
                <canvas id="clockCanvas" width="500" height="500"></canvas>
            </div>
            
            <!-- Okunuş Paneli -->
            <div class="readings-panel">
                <!-- Dijital Saat -->
                <div id="digitalClock" class="text-2xl md:text-3xl font-mono font-bold text-indigo-600 tracking-widest text-center mb-2">
                    12:00
                </div>
                
                <!-- Ana Okunuş -->
                <div class="bg-white p-2.5 md:p-3 rounded-xl shadow-sm border border-slate-200 text-center mb-2">
                    <div id="timeWordsMain" class="text-base md:text-lg font-bold text-slate-800 italic leading-snug">
                        Kello on kaksitoista
                    </div>
                    <div id="arabicMain" class="text-sm md:text-base text-indigo-500 font-semibold arabic mt-1">
                        الساعة هي الثانية عشرة
                    </div>
                </div>

                <!-- Alternatif Okunuş (Sabit Yükseklik) -->
                <div class="alt-reading-block">
                    <div id="altSection" class="invisible">
                        <div class="text-[8px] md:text-[9px] uppercase text-slate-400 font-bold mb-1 text-center flex items-center justify-center gap-1.5">
                            <hr class="flex-grow border-slate-200">
                            <span><span id="connectorText">tai voimme sanoa</span> <span class="arabic ml-0.5">(أو يمكننا القول)</span></span>
                            <hr class="flex-grow border-slate-200">
                        </div>
                        <div class="bg-white p-2 md:p-2.5 rounded-xl shadow-sm border border-slate-200 text-center">
                            <div id="timeWordsAlt" class="text-sm md:text-base font-bold text-slate-800 italic leading-snug">
                                -
                            </div>
                            <div id="arabicAlt" class="text-xs md:text-sm text-indigo-500 font-semibold arabic mt-0.5">
                                -
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Alt Bölüm: Kompakt Footer -->
        <div class="footer-section">
            <!-- Dakika Sayaçları - Kompakt Grid -->
            <div class="grid grid-cols-2 gap-2 mb-2">
                <div class="bg-emerald-50 px-2 py-1.5 rounded-lg border border-emerald-200 text-center">
                    <div class="flex items-center justify-center gap-1.5">
                        <div class="flex-1 text-left">
                            <span class="text-[8px] md:text-[9px] font-bold text-emerald-800 uppercase block">Yli</span>
                            <span class="arabic text-[7px] md:text-[8px] text-emerald-600">(بعد)</span>
                        </div>
                        <div id="past-counter" class="text-emerald-600 text-base md:text-lg font-black">0</div>
                    </div>
                </div>
                <div class="bg-rose-50 px-2 py-1.5 rounded-lg border border-rose-200 text-center">
                    <div class="flex items-center justify-center gap-1.5">
                        <div class="flex-1 text-left">
                            <span class="text-[8px] md:text-[9px] font-bold text-rose-800 uppercase block">Vaille</span>
                            <span class="arabic text-[7px] md:text-[8px] text-rose-600">(إلا)</span>
                        </div>
                        <div id="to-counter" class="text-rose-600 text-base md:text-lg font-black">60</div>
                    </div>
                </div>
            </div>

            <!-- Dil Butonları - Kompakt -->
            <div class="flex gap-1.5 justify-center">
                <button onclick="setLanguage('fi')" id="btn-fi" class="btn-lang px-3 py-1.5 rounded-full font-bold text-[9px] md:text-[10px] bg-indigo-600 text-white shadow-md">
                    Suomi
                </button>
                <button onclick="setLanguage('en')" id="btn-en" class="btn-lang px-3 py-1.5 rounded-full font-bold text-[9px] md:text-[10px] bg-slate-200 text-slate-600">
                    English
                </button>
                <button onclick="setLanguage('tr')" id="btn-tr" class="btn-lang px-3 py-1.5 rounded-full font-bold text-[9px] md:text-[10px] bg-slate-200 text-slate-600">
                    Türkçe
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('clockCanvas');
        const ctx = canvas.getContext('2d');
        const digitalClock = document.getElementById('digitalClock');
        const timeWordsMain = document.getElementById('timeWordsMain');
        const arabicMain = document.getElementById('arabicMain');
        const timeWordsAlt = document.getElementById('timeWordsAlt');
        const arabicAlt = document.getElementById('arabicAlt');
        const altSection = document.getElementById('altSection');
        const pastCounter = document.getElementById('past-counter');
        const toCounter = document.getElementById('to-counter');
        const connectorText = document.getElementById('connectorText');
        
        let language = 'fi';
        let currentMinutes = 0; 
        let dragTarget = null;
        
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const clockRadius = 155; 
        const ringRadius = 215; 

        function setLanguage(lang) {
            language = lang;
            ['fi', 'en', 'tr'].forEach(b => {
                const btn = document.getElementById(`btn-${b}`);
                if (b === lang) {
                    btn.className = 'btn-lang px-3 py-1.5 rounded-full font-bold text-[9px] md:text-[10px] bg-indigo-600 text-white shadow-md';
                } else {
                    btn.className = 'btn-lang px-3 py-1.5 rounded-full font-bold text-[9px] md:text-[10px] bg-slate-200 text-slate-600';
                }
            });
            updateDisplay();
        }

        function drawClock() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const m = currentMinutes % 60;
            const h = Math.floor(currentMinutes / 60) % 12;
            const mAngleRad = (m * 6 - 90) * (Math.PI / 180);

            // 1. Dış Ring
            ctx.beginPath();
            ctx.lineWidth = 45; 
            ctx.lineCap = 'butt';
            ctx.strokeStyle = '#34d399'; 
            ctx.arc(centerX, centerY, ringRadius, -Math.PI / 2, mAngleRad, false);
            ctx.stroke();

            ctx.beginPath();
            ctx.strokeStyle = '#fb7185'; 
            ctx.arc(centerX, centerY, ringRadius, mAngleRad, 1.5 * Math.PI, false);
            ctx.stroke();

            // Ring ayırıcı
            ctx.beginPath();
            ctx.lineWidth = 6;
            ctx.strokeStyle = 'white';
            ctx.moveTo(centerX, centerY - ringRadius - 25); 
            ctx.lineTo(centerX, centerY - ringRadius + 25);
            ctx.stroke();

            // Ring üzerindeki sayılar
            if (m > 2) drawTextOnRing(m.toString(), (-Math.PI/2 + mAngleRad)/2, ringRadius, '#064e3b');
            if (m < 58) drawTextOnRing(((60-m)%60).toString(), (mAngleRad + 1.5*Math.PI)/2, ringRadius, '#881337');

            // 2. Saat Kadranı
            ctx.beginPath(); 
            ctx.arc(centerX, centerY, clockRadius, 0, 2 * Math.PI); 
            ctx.fillStyle = 'white'; 
            ctx.fill();
            ctx.strokeStyle = '#334155'; 
            ctx.lineWidth = 4; 
            ctx.stroke();

            // Saat Numaraları
            ctx.fillStyle = '#0f172a'; 
            ctx.font = 'bold 26px Arial'; 
            ctx.textAlign = 'center'; 
            ctx.textBaseline = 'middle';
            for (let i = 1; i <= 12; i++) {
                const angle = (i * 30 - 90) * (Math.PI / 180);
                ctx.fillText(i.toString(), centerX + (clockRadius - 35) * Math.cos(angle), centerY + (clockRadius - 35) * Math.sin(angle));
            }
            
            // Çizgiler
            for (let i = 0; i < 60; i++) {
                const angle = (i * 6 - 90) * (Math.PI / 180);
                const isBig = i % 5 === 0;
                ctx.beginPath(); 
                ctx.lineWidth = isBig ? 4 : 2; 
                ctx.strokeStyle = isBig ? '#0f172a' : '#cbd5e1';
                const startDist = isBig ? clockRadius - 18 : clockRadius - 10;
                ctx.moveTo(centerX + startDist * Math.cos(angle), centerY + startDist * Math.sin(angle));
                ctx.lineTo(centerX + clockRadius * Math.cos(angle), centerY + clockRadius * Math.sin(angle)); 
                ctx.stroke();
            }

            // 3. Akrep ve Yelkovan
            const hAngle = ((h + m/60) * 30 - 90) * (Math.PI/180);
            const yAngle = (m * 6 - 90) * (Math.PI/180);
            
            drawHand(hAngle, clockRadius * 0.55, 14, '#1e293b'); 
            drawHand(yAngle, clockRadius * 0.85, 8, '#4f46e5');  

            // Merkez Pin
            ctx.beginPath(); ctx.arc(centerX, centerY, 12, 0, 2 * Math.PI); ctx.fillStyle = '#1e293b'; ctx.fill();
            ctx.beginPath(); ctx.arc(centerX, centerY, 4, 0, 2 * Math.PI); ctx.fillStyle = 'white'; ctx.fill();
        }

        function drawTextOnRing(text, angleRad, radius, color) {
            const x = centerX + radius * Math.cos(angleRad);
            const y = centerY + radius * Math.sin(angleRad);
            ctx.fillStyle = color; 
            ctx.font = '900 32px sans-serif'; 
            ctx.textAlign = 'center'; 
            ctx.textBaseline = 'middle';
            ctx.shadowBlur = 4; ctx.shadowColor = "rgba(255,255,255,0.8)";
            ctx.fillText(text, x, y); 
            ctx.shadowBlur = 0;
        }

        function drawHand(angle, length, width, color) {
            ctx.beginPath(); ctx.lineCap = 'round'; ctx.lineWidth = width; ctx.strokeStyle = color;
            ctx.moveTo(centerX, centerY); ctx.lineTo(centerX + length * Math.cos(angle), centerY + length * Math.sin(angle));
            ctx.stroke();
        }

        function updateDisplay() {
            const h = Math.floor(currentMinutes / 60) % 12;
            const m = currentMinutes % 60;
            const displayH = h === 0 ? 12 : h;
            
            digitalClock.innerText = `${displayH.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
            pastCounter.innerText = m.toString();
            toCounter.innerText = ((60 - m) % 60).toString();

            const res = formatTimeWords(h, m);
            
            timeWordsMain.innerText = res.main;
            arabicMain.innerText = res.mainAr;

            if (res.alt) {
                timeWordsAlt.innerText = res.alt;
                arabicAlt.innerText = res.altAr;
                connectorText.innerText = getConnector(language);
                altSection.classList.remove('invisible');
            } else {
                altSection.classList.add('invisible');
            }
            drawClock();
        }

        function getConnector(lang) {
            if (lang === 'fi') return "tai voimme sanoa";
            if (lang === 'tr') return "veya şöyle diyebiliriz";
            return "or we can say";
        }

        function formatTimeWords(h, m) {
            const fiNums = ["kaksitoista", "yksi", "kaksi", "kolme", "neljä", "viisi", "kuusi", "seitsemän", "kahdeksan", "yhdeksän", "kymmenen", "yksitoista", "kaksitoista"];
            const enNums = ["twelve", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine", "ten", "eleven", "twelve"];
            const trNums = ["on iki", "bir", "iki", "üç", "dört", "beş", "altı", "yedi", "sekiz", "dokuz", "on", "on bir", "on iki"];
            const arNums = ["الثانية عشرة", "الواحدة", "الثانية", "الثالثة", "الرابعة", "الخامسة", "السادسة", "السابعة", "الثامنة", "التاسعة", "العاشرة", "الحادية عشرة", "الثانية عشرة"];
            
            const nextH = (h + 1) % 12 || 12;
            const curH = h % 12 || 12;

            let res = { main: "", mainAr: "", alt: "", altAr: "" };

            if (language === 'fi') {
                if (m === 0) { res.main = `Kello on ${fiNums[curH]}`; res.mainAr = `الساعة هي ${arNums[curH]} تماماً`; }
                else if (m === 30) { res.main = `Kello on puoli ${fiNums[nextH]}`; res.mainAr = `الساعة هي ${arNums[curH]} والنصف`; }
                else if (m === 15) { 
                    res.main = `Kello on varttia yli ${fiNums[curH]}`; res.mainAr = `الساعة هي ${arNums[curH]} والربع`; 
                    res.alt = `Kello on viisitoista yli ${fiNums[curH]}`; res.altAr = `الساعة هي ${arNums[curH]} وخمس عشرة دقيقة`;
                }
                else if (m === 45) { 
                    res.main = `Kello on varttia vaille ${fiNums[nextH]}`; res.mainAr = `الساعة هي ${arNums[nextH]} إلا الربع`; 
                    res.alt = `Kello on viisitoista vaille ${fiNums[nextH]}`; res.altAr = `الساعة هي ${arNums[nextH]} إلا خمس عشرة دقيقة`;
                }
                else if (m < 30) { res.main = `Kello on ${m} yli ${fiNums[curH]}`; res.mainAr = `الساعة هي ${arNums[curH]} و ${m} دقيقة`; }
                else { res.main = `Kello on ${60 - m} vaille ${fiNums[nextH]}`; res.mainAr = `الساعة هي ${arNums[nextH]} إلا ${60 - m} دقيقة`; }
            } else if (language === 'en') {
                if (m === 0) { res.main = `It's ${enNums[curH]} o'clock`; res.mainAr = `الساعة هي ${arNums[curH]} تماماً`; }
                else if (m === 15) { res.main = `It's quarter past ${enNums[curH]}`; res.mainAr = `الساعة هي ${arNums[curH]} والربع`; res.alt = `It's fifteen minutes past ${enNums[curH]}`; res.altAr = `الساعة هي ${arNums[curH]} وخمس عشرة دقيقة`; }
                else if (m === 30) { res.main = `It's half past ${enNums[curH]}`; res.mainAr = `الساعة هي ${arNums[curH]} والنصف`; }
                else if (m === 45) { res.main = `It's quarter to ${enNums[nextH]}`; res.mainAr = `الساعة هي ${arNums[nextH]} إلا الربع`; res.alt = `It's fifteen minutes to ${enNums[nextH]}`; res.altAr = `الساعة هي ${arNums[nextH]} إلا خمس عشرة دقيقة`; }
                else if (m < 30) { res.main = `It's ${m} minutes past ${enNums[curH]}`; res.mainAr = `الساعة هي ${arNums[curH]} و ${m} دقيقة`; }
                else { res.main = `It's ${60 - m} minutes to ${enNums[nextH]}`; res.mainAr = `الساعة هي ${arNums[nextH]} إلا ${60 - m} دقيقة`; }
            } else if (language === 'tr') {
                const trAcc = ["on ikiyi", "biri", "ikiyi", "üçü", "dördü", "beşi", "altıyı", "yediyi", "sekizi", "dokuzu", "onu", "on biri", "on ikiyi"];
                const trDat = ["on ikiye", "bire", "ikiye", "üçe", "dörde", "beşe", "altıya", "yediye", "sekize", "dokuza", "ona", "on bire", "on ikiye"];
                if (m === 0) { res.main = `Saat ${trNums[curH]}`; res.mainAr = `الساعة هي ${arNums[curH]} تماماً`; }
                else if (m === 30) { res.main = `Saat ${trNums[curH]} buçuk`; res.mainAr = `الساعة هي ${arNums[curH]} والنصف`; }
                else if (m === 15) { res.main = `Saat ${trAcc[curH]} çeyrek geçiyor`; res.mainAr = `الساعة هي ${arNums[curH]} والربع`; res.alt = `Saat ${trAcc[curH]} on beş geçiyor`; res.altAr = `الساعة هي ${arNums[curH]} وخمس عشرة دقيقة`; }
                else if (m === 45) { res.main = `Saat ${trDat[nextH]} çeyrek var`; res.mainAr = `الساعة هي ${arNums[nextH]} إلا الربع`; res.alt = `Saat ${trDat[nextH]} on beş var`; res.altAr = `الساعة هي ${arNums[nextH]} إلا خمس عشرة دقيقة`; }
                else if (m < 30) { res.main = `Saat ${trAcc[curH]} ${m} geçiyor`; res.mainAr = `الساعة هي ${arNums[curH]} و ${m} دقيقة`; }
                else { res.main = `Saat ${trDat[nextH]} ${60 - m} var`; res.mainAr = `الساعة هي ${arNums[nextH]} إلا ${60 - m} دقيقة`; }
            }
            return res;
        }

        function getMouseAngle(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            let angle = Math.atan2(clientY - (rect.top + rect.height/2), clientX - (rect.left + rect.width/2)) * (180 / Math.PI) + 90;
            return angle < 0 ? angle + 360 : angle;
        }

        function startDragging(e) {
            const angle = getMouseAngle(e);
            const h = Math.floor(currentMinutes / 60) % 12; const m = currentMinutes % 60;
            const diffM = Math.min(Math.abs(angle - m*6), 360 - Math.abs(angle - m*6));
            const diffH = Math.min(Math.abs(angle - (h*30 + m*0.5)), 360 - Math.abs(angle - (h*30 + m*0.5)));
            if (diffM < diffH && diffM < 50) dragTarget = 'minute';
            else if (diffH < 50) dragTarget = 'hour';
            else dragTarget = diffM < diffH ? 'minute' : 'hour';
        }

        function handleInteraction(e) {
            if (!dragTarget) return; if (e.cancelable) e.preventDefault();
            const angle = getMouseAngle(e);
            let h = Math.floor(currentMinutes / 60) % 12; let m = currentMinutes % 60;
            if (dragTarget === 'minute') { m = Math.round(angle / 6) % 60; currentMinutes = (h * 60) + m; }
            else if (dragTarget === 'hour') { h = Math.floor(angle / 30) % 12; currentMinutes = (h * 60) + m; }
            updateDisplay();
        }

        canvas.addEventListener('mousedown', startDragging);
        window.addEventListener('mouseup', () => dragTarget = null);
        window.addEventListener('mousemove', handleInteraction);
        canvas.addEventListener('touchstart', (e) => { startDragging(e); handleInteraction(e); }, { passive: false });
        window.addEventListener('touchend', () => dragTarget = null);
        window.addEventListener('touchmove', handleInteraction, { passive: false });

        updateDisplay();
    </script>
</body>
</html>
