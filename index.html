<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kello</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#111; display:flex; justify-content:center; align-items:center; height:100vh; }
canvas { background:white; border-radius:50%; touch-action:none; }
</style>
</head>

<body>

<div class="text-center text-white">
    <canvas id="clockCanvas" width="400" height="400"></canvas>

    <div class="mt-4 flex gap-2 justify-center items-center">
        <div id="digitalClock" class="text-2xl font-mono">12:00</div>
        <input id="timeInput" type="time" step="60" class="text-black px-2 py-1 rounded">
    </div>
</div>

<script>
const canvas = document.getElementById('clockCanvas');
const ctx = canvas.getContext('2d');

let currentMinutes = 0;
let dragTarget = null;

const cx = 200, cy = 200, r = 150;

// ---------- DRAW ----------
function drawClock() {
    ctx.clearRect(0,0,400,400);

    // face
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();
    ctx.stroke();

    // numbers
    for(let i=1;i<=12;i++){
        let ang = (i*30-90)*Math.PI/180;
        ctx.fillStyle="black";
        ctx.font="20px Arial";
        ctx.textAlign="center";
        ctx.textBaseline="middle";
        ctx.fillText(i, cx + Math.cos(ang)*(r-30), cy + Math.sin(ang)*(r-30));
    }

    let m = currentMinutes % 60;
    let h = Math.floor(currentMinutes/60)%12;

    // minute hand
    drawHand(m*6, r-20, 4, "blue");

    // hour hand
    drawHand(h*30 + m*0.5, r-60, 6, "black");

    // center
    ctx.beginPath();
    ctx.arc(cx, cy, 5, 0, Math.PI*2);
    ctx.fill();
}

function drawHand(angle, length, width, color){
    let a = (angle-90)*Math.PI/180;
    ctx.beginPath();
    ctx.lineWidth = width;
    ctx.strokeStyle = color;
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a)*length, cy + Math.sin(a)*length);
    ctx.stroke();
}

// ---------- UPDATE ----------
function updateDisplay(){
    let h = Math.floor(currentMinutes/60)%12;
    let m = currentMinutes%60;

    document.getElementById('digitalClock').innerText =
        `${(h||12).toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;

    document.getElementById('timeInput').value =
        `${(h||12).toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;

    drawClock();
}

// ---------- DRAG FIX ----------
function startDrag(e){
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX || e.touches[0].clientX) - rect.left;
    const y = (e.clientY || e.touches[0].clientY) - rect.top;

    const dx = x - cx;
    const dy = y - cy;

    const dist = Math.sqrt(dx*dx + dy*dy);

    let angle = Math.atan2(dy, dx) * 180/Math.PI + 90;
    if(angle<0) angle+=360;

    let m = currentMinutes%60;
    let h = Math.floor(currentMinutes/60)%12;

    let mAngle = m*6;
    let hAngle = h*30 + m*0.5;

    let diffM = Math.min(Math.abs(angle-mAngle), 360-Math.abs(angle-mAngle));
    let diffH = Math.min(Math.abs(angle-hAngle), 360-Math.abs(angle-hAngle));

    if(dist > 100){
        dragTarget = diffM < 25 ? "minute" : null;
    } else {
        dragTarget = diffH < 25 ? "hour" : null;
    }

    if(!dragTarget){
        dragTarget = diffM < diffH ? "minute" : "hour";
    }
}

function moveDrag(e){
    if(!dragTarget) return;

    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX || e.touches[0].clientX) - rect.left;
    const y = (e.clientY || e.touches[0].clientY) - rect.top;

    const dx = x - cx;
    const dy = y - cy;

    let angle = Math.atan2(dy, dx) * 180/Math.PI + 90;
    if(angle<0) angle+=360;

    let h = Math.floor(currentMinutes/60);
    let m = currentMinutes%60;

    if(dragTarget === "minute"){
        m = Math.round(angle/6)%60;
    } else {
        h = Math.floor(angle/30)%12;
    }

    currentMinutes = h*60 + m;
    updateDisplay();
}

function stopDrag(){
    dragTarget = null;
}

// ---------- INPUT ----------
document.getElementById('timeInput').addEventListener('input', e=>{
    let val = e.target.value;
    if(!val) return;

    let [h,m] = val.split(':').map(Number);
    currentMinutes = (h%12)*60 + m;
    updateDisplay();
});

// ---------- EVENTS ----------
canvas.addEventListener('mousedown', startDrag);
window.addEventListener('mousemove', moveDrag);
window.addEventListener('mouseup', stopDrag);

canvas.addEventListener('touchstart', startDrag, {passive:false});
canvas.addEventListener('touchmove', moveDrag, {passive:false});
canvas.addEventListener('touchend', stopDrag);

// ---------- INIT ----------
updateDisplay();
</script>

</body>
</html>
